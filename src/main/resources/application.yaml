spring:
  application:
    name: Razorpay
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Razorpay}
    username: ${DB_USER:diwakar}
    password: ${DB_PW:diwakar}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8000
